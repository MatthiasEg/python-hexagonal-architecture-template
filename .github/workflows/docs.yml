name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build and publish MkDocs site
    runs-on: ubuntu-latest
    steps:
      # persist-credentials must stay on: `mkdocs gh-deploy` uses the checkout
      # credential to push the built site to the gh-pages branch.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4  # zizmor: ignore[artipacked]

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.9.18"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Sync docs dependencies
        run: uv sync --frozen --group docs

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force
