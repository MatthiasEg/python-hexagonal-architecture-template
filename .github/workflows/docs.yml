name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Build and publish MkDocs site
    runs-on: ubuntu-latest
    steps:
      # persist-credentials must stay on: `mkdocs gh-deploy` uses the checkout
      # credential to push the built site to the gh-pages branch.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4  # zizmor: ignore[artipacked]

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.9.18"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Sync docs dependencies
        run: uv sync --frozen --group docs

      - name: Deploy to GitHub Pages
        run: uv run mkdocs gh-deploy --force
