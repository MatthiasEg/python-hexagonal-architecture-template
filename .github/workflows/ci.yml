name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; no job here needs more than read.
permissions:
  contents: read

env:
  UV_FROZEN: "1"

jobs:
  check:
    name: Validation loop
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Integration tests and schemathesis use this instead of testcontainers when set.
      APP_DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/app
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so diff-cover can compare a PR against its base branch.
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.9.18"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run the full validation loop
        run: uv run poe check

      # New/changed lines must be tested, independent of the repo-wide coverage floor.
      - name: Diff coverage (pull requests)
        if: github.event_name == 'pull_request'
        env:
          # Passed through the environment (not interpolated into the script) to avoid
          # template injection; zizmor enforces this.
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          uv run diff-cover coverage.xml --compare-branch="origin/$BASE_REF" --fail-under=90

  conventions:
    name: Architecture conventions (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.9.18"

      # ADR-0003: commit only through the UnitOfWork, and other conventions import-linter
      # cannot express. Python 3.13 avoids a protobuf incompatibility on 3.14.
      - name: Enforce architecture conventions
        run: uvx --python 3.13 semgrep@1.169.0 --config .semgrep/rules/ --error --quiet src

  migration-safety:
    name: Migration lock-safety (Squawk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.9.18"
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install Squawk
        run: npm install -g squawk-cli

      - name: Lint migration DDL for lock-safety
        run: uv run poe migration-lint

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  workflows:
    name: Workflow security (zizmor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.9.18"

      - name: Audit GitHub Actions workflows
        run: uvx zizmor@1.5.2 --offline .github/workflows/
