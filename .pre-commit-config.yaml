default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: import-linter
        name: architecture check
        entry: uv run lint-imports
        language: system
        pass_filenames: false

      - id: deptry
        name: dependency check (deptry)
        entry: uv run deptry src
        language: system
        pass_filenames: false

      - id: conventions
        name: architecture conventions (semgrep)
        entry: uv run poe conventions
        language: system
        pass_filenames: false
        files: ^src/.*\.py$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.4
    hooks:
      - id: commitizen
        stages: [commit-msg]
